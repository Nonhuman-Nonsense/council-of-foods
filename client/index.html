<head>
  <meta charset="utf-8" />

  <link rel="icon" href="/icons/favicon-48.webp" type="image/webp" sizes="48x48" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />

    content="A political arena where the foods themselves discuss the broken food system, through the use of artificial intelligence. Join the discussion on what actions need to be taken to form a locally and globally sustainable food system!" />

      manifest.json provides metadata used when your web app is installed on a

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
  <script>
    // Listen for the wheel event
    window.addEventListener(
      "wheel",
      function (event) {
        // Check if the Ctrl key is pressed
        if (event.ctrlKey) {
          // Prevent the default behavior (zooming)
          event.preventDefault();
        }
      },
      { passive: false }
    ); // Add { passive: false } option
  </script>
</body>

</html>
